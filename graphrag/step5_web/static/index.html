<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confluence GraphRAG</title>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<script src="https://unpkg.com/3d-force-graph@1"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #1e293b;
  color: #e2e8f0;
}
.container {
  display: flex;
  height: 100vh;
  padding: 12px;
  gap: 12px;
}

/* ── Left Panel ── */
.left-panel {
  flex: 0 0 clamp(300px, 25vw, 420px);
  background: #0f172a;
  border-radius: 12px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  border: 1px solid #334155;
}

/* ── Right Panel ── */
.right-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-height: 0;
  overflow: hidden;
}

/* ── Toolbar ── */
.toolbar {
  background: #0f172a;
  border-radius: 12px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  border: 1px solid #334155;
}
.toolbar-group { display: flex; align-items: center; gap: 6px; }
.toolbar-divider { width: 1px; height: 28px; background: #334155; }
.filter-chip {
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.2s;
  user-select: none;
}
.filter-chip.active { opacity: 1; }
.filter-chip.inactive { opacity: 0.35; }
.domain-select {
  padding: 4px 8px;
  border-radius: 8px;
  border: 1px solid #334155;
  background: #1e293b;
  color: #e2e8f0;
  font-size: 11px;
  outline: none;
  cursor: pointer;
  min-width: 110px;
}
.domain-select:focus { border-color: #3b82f6; }
.domain-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  color: #0f172a;
  cursor: default;
  white-space: nowrap;
}
.domain-tag-x {
  cursor: pointer;
  font-size: 13px;
  line-height: 1;
  opacity: 0.7;
  margin-left: 2px;
}
.domain-tag-x:hover { opacity: 1; }
.mode-chip {
  padding: 5px 12px;
  border-radius: 8px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  background: #1e293b;
  color: #94a3b8;
  border: 1px solid #334155;
  transition: all 0.2s;
}
.mode-chip.active {
  background: #3b82f6;
  color: #fff;
  border-color: #3b82f6;
}
.search-input {
  padding: 5px 10px;
  border-radius: 8px;
  border: 1px solid #334155;
  background: #1e293b;
  color: #e2e8f0;
  font-size: 12px;
  width: 160px;
  outline: none;
}
.search-input:focus { border-color: #3b82f6; }
.search-input::placeholder { color: #64748b; }

/* ── Graph Container ── */
.graph-container {
  flex: 1 1 0;
  min-height: 0;
  border-radius: 12px;
  background: #0f172a;
  position: relative;
  overflow: hidden;
  border: 1px solid #334155;
}
#mynetwork { width: 100%; height: 100%; }

/* ── Legend ── */
.legend {
  position: absolute;
  bottom: 12px;
  right: 12px;
  background: rgba(15,23,42,0.92);
  padding: 8px 14px;
  border-radius: 8px;
  border: 1px solid #334155;
  font-size: 10px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.legend-item { display: flex; align-items: center; gap: 4px; color: #94a3b8; }
.legend-color { width: 12px; height: 12px; border-radius: 3px; }

/* ── Node Info Panel ── */
.node-info-panel {
  position: absolute;
  bottom: 12px;
  left: 12px;
  background: rgba(15,23,42,0.96);
  padding: 16px;
  border-radius: 10px;
  border: 1px solid #334155;
  font-size: 12px;
  max-width: 420px;
  max-height: 400px;
  overflow-y: auto;
  display: none;
}
.node-info-panel.active { display: block; }
.node-info-title {
  font-weight: 700;
  font-size: 14px;
  color: #e2e8f0;
  margin-bottom: 10px;
  border-bottom: 2px solid #3b82f6;
  padding-bottom: 6px;
}
.node-info-section { margin-bottom: 10px; }
.node-info-section-title {
  font-weight: 600;
  color: #3b82f6;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}
.node-info-item { margin-bottom: 4px; line-height: 1.5; }
.node-info-key { font-weight: 600; color: #94a3b8; display: inline-block; min-width: 90px; }
.node-info-value { color: #e2e8f0; word-break: break-word; }
.node-info-value a { color: #60a5fa; text-decoration: none; }
.node-info-value a:hover { text-decoration: underline; }
.close-panel {
  position: absolute;
  top: 8px;
  right: 10px;
  cursor: pointer;
  font-size: 18px;
  color: #64748b;
}
.close-panel:hover { color: #e2e8f0; }
.similar-item {
  padding: 4px 8px;
  margin: 2px 0;
  border-radius: 4px;
  cursor: pointer;
  color: #94a3b8;
  font-size: 11px;
}
.similar-item:hover { background: #1e293b; color: #e2e8f0; }
.expand-btn {
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid #334155;
  background: #1e293b;
  color: #60a5fa;
  font-size: 11px;
  cursor: pointer;
  margin-top: 6px;
}
.expand-btn:hover { background: #334155; }

/* ── Settings Panel ── */
.settings-panel {
  position: absolute;
  top: 12px;
  right: 12px;
  background: rgba(15,23,42,0.96);
  padding: 14px;
  border-radius: 10px;
  border: 1px solid #334155;
  font-size: 12px;
  width: 220px;
  display: none;
}
.settings-panel.active { display: block; }
.settings-title {
  font-weight: 700;
  color: #e2e8f0;
  margin-bottom: 10px;
  font-size: 13px;
}
.setting-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.setting-label { color: #94a3b8; font-size: 11px; }
.setting-slider {
  width: 100px;
  accent-color: #3b82f6;
}
.setting-toggle {
  width: 36px; height: 18px;
  border-radius: 9px;
  background: #334155;
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
}
.setting-toggle.on { background: #3b82f6; }
.setting-toggle::after {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #fff;
  top: 2px; left: 2px;
  transition: transform 0.2s;
}
.setting-toggle.on::after { transform: translateX(18px); }

/* ── Left Panel Content ── */
h1 { font-size: 20px; color: #60a5fa; margin-bottom: 4px; }
.subtitle { font-size: 12px; color: #64748b; margin-bottom: 16px; }

.tab-bar {
  display: flex;
  gap: 2px;
  margin-bottom: 14px;
  background: #1e293b;
  border-radius: 8px;
  padding: 2px;
}
.tab-btn {
  flex: 1;
  padding: 8px;
  text-align: center;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border-radius: 6px;
  background: transparent;
  color: #64748b;
  border: none;
  transition: all 0.2s;
}
.tab-btn.active { background: #3b82f6; color: #fff; }
.tab-btn:hover:not(.active) { color: #94a3b8; }

.tab-content { display: none; flex: 1; overflow: hidden; min-height: 0; }
.tab-content.active { display: flex; flex-direction: column; }
.query-input-section { flex-shrink: 0; }
.query-results-section { flex: 1; overflow-y: auto; min-height: 0; }

/* Query Tab */
.mode-toggle {
  display: flex;
  margin-bottom: 12px;
  border: 1px solid #334155;
  border-radius: 6px;
  overflow: hidden;
}
.mode-btn {
  flex: 1;
  padding: 8px;
  text-align: center;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  background: #1e293b;
  color: #64748b;
  border: none;
  transition: all 0.2s;
}
.mode-btn.active { background: #3b82f6; color: white; }
textarea {
  width: 100%;
  padding: 10px;
  border: 1px solid #334155;
  border-radius: 6px;
  font-size: 13px;
  font-family: inherit;
  resize: vertical;
  background: #1e293b;
  color: #e2e8f0;
  margin-bottom: 8px;
}
textarea:focus { outline: none; border-color: #3b82f6; }
textarea::placeholder { color: #475569; }
.input-row { display: flex; gap: 8px; align-items: stretch; margin-bottom: 12px; }
.topk-select {
  padding: 8px;
  border: 1px solid #334155;
  border-radius: 6px;
  background: #1e293b;
  color: #e2e8f0;
  font-size: 12px;
  cursor: pointer;
}
.ask-btn {
  flex: 1;
  padding: 10px;
  background: #3b82f6;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.ask-btn:hover { background: #2563eb; }
.ask-btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
.example-queries { padding: 10px; background: #1e293b; border-radius: 6px; margin-bottom: 12px; }
.example-queries.hidden { display: none; }
.example-queries h3 { font-size: 11px; color: #3b82f6; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.example-query { font-size: 11px; color: #94a3b8; padding: 5px 8px; cursor: pointer; border-radius: 4px; }
.example-query:hover { background: #334155; color: #e2e8f0; }

.answer-box {
  background: #1e293b;
  padding: 12px;
  border-radius: 6px;
  border-left: 3px solid #3b82f6;
  display: none;
}
.answer-label { font-weight: 600; color: #3b82f6; margin-bottom: 6px; font-size: 12px; }
.answer-content { color: #e2e8f0; line-height: 1.7; font-size: 13px; }
.answer-content a { color: #60a5fa; text-decoration: none; border-bottom: 1px dashed #60a5fa40; transition: all 0.2s; }
.answer-content a:hover { color: #93c5fd; border-bottom-color: #93c5fd; }
.answer-content strong { color: #f8fafc; }
.answer-content ul, .answer-content ol { margin-left: 18px; margin-bottom: 8px; }
.answer-content li { margin-bottom: 3px; }
.answer-content p { margin-bottom: 8px; }
.info-box {
  background: #0f172a;
  padding: 8px;
  border-radius: 4px;
  margin-top: 8px;
  font-size: 11px;
  color: #94a3b8;
  line-height: 1.7;
}
.cypher-box {
  background: #020617;
  color: #a3e635;
  padding: 10px;
  border-radius: 4px;
  margin-top: 8px;
  font-size: 11px;
  font-family: 'Consolas', monospace;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 100px;
  overflow-y: auto;
  display: none;
}

.domain-btn-container {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
}
.domain-btn {
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid #334155;
  background: #1e293b;
  color: #60a5fa;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.domain-btn:hover { background: #3b82f6; color: #fff; border-color: #3b82f6; }
.streaming-cursor::after {
  content: '▋';
  animation: blink 0.7s step-end infinite;
  color: #3b82f6;
}
@keyframes blink { 50% { opacity: 0; } }

/* Analytics Tab */
.analytics-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}
.stat-card {
  background: #1e293b;
  padding: 12px;
  border-radius: 8px;
  text-align: center;
  border: 1px solid #334155;
}
.stat-value { font-size: 24px; font-weight: 700; color: #60a5fa; }
.stat-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
.chart-container { background: #1e293b; border-radius: 8px; padding: 12px; margin-bottom: 10px; border: 1px solid #334155; }
.chart-title { font-size: 12px; font-weight: 600; color: #94a3b8; margin-bottom: 8px; }
.chart-container canvas { max-height: 160px; }
.degree-list { background: #1e293b; border-radius: 8px; padding: 12px; border: 1px solid #334155; }
.degree-item {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
  font-size: 11px;
  color: #94a3b8;
  border-bottom: 1px solid #0f172a;
}
.degree-item:last-child { border: none; }
.degree-bar {
  height: 4px;
  background: #3b82f6;
  border-radius: 2px;
  margin-top: 2px;
}

/* Loading */
.loading {
  display: none;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  background: rgba(15,23,42,0.95);
  padding: 20px 40px;
  border-radius: 10px;
  border: 1px solid #334155;
  z-index: 1000;
  text-align: center;
}
.loading.active { display: block; }
.spinner {
  border: 3px solid #334155;
  border-top: 3px solid #3b82f6;
  border-radius: 50%;
  width: 32px;
  height: 32px;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 8px;
}
@keyframes spin { 100% { transform: rotate(360deg); } }

/* Reset highlight button */
.reset-highlight-btn {
  display: none;
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  padding: 6px 16px;
  border-radius: 8px;
  background: #ef4444;
  color: #fff;
  font-size: 12px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(239,68,68,0.4);
}
.reset-highlight-btn:hover { background: #dc2626; }
.reset-highlight-btn.visible { display: block; }

/* Gear icon */
.gear-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 32px;
  height: 32px;
  border-radius: 6px;
  background: rgba(15,23,42,0.8);
  border: 1px solid #334155;
  color: #94a3b8;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 50;
}
.gear-btn:hover { color: #e2e8f0; background: #1e293b; }
</style>
</head>
<body>
<div class="container">
  <div class="left-panel">
    <h1>Confluence GraphRAG</h1>
    <div class="subtitle">Neo4j Knowledge Graph + AI Search <span style="font-size:9px;color:#475569">v3</span></div>

    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('query')">Query</button>
      <button class="tab-btn" onclick="switchTab('analytics')">Analytics</button>
    </div>

    <!-- Query Tab -->
    <div class="tab-content active" id="tab-query">
      <div class="query-input-section">
        <textarea id="question" rows="2" placeholder="Ask about your technical documents..."></textarea>
        <div class="input-row">
          <select class="topk-select" id="topK">
            <option value="1">Top 1</option>
            <option value="3" selected>Top 3</option>
            <option value="5">Top 5</option>
            <option value="10">Top 10</option>
          </select>
          <button class="ask-btn" id="askButton" onclick="askQuestion()">Search</button>
        </div>
      </div>

      <div class="query-results-section">
        <div class="example-queries" id="exampleQueries">
          <h3>Example Queries</h3>
          <div class="example-query" onclick="setQuestion('Jira 관련 문서를 알려줘')">Jira 관련 문서를 알려줘</div>
          <div class="example-query" onclick="setQuestion('CI/CD 파이프라인 설정 방법')">CI/CD 파이프라인 설정 방법</div>
          <div class="example-query" onclick="setQuestion('사용자 추가 방법 알려줘')">사용자 추가 방법 알려줘</div>
          <div class="example-query" onclick="setQuestion('토픽별 문서 분류')">토픽별 문서 분류</div>
        </div>

        <div class="answer-box" id="answerBox">
          <div class="answer-label">Answer</div>
          <div class="answer-content" id="answer"></div>
          <div class="domain-btn-container" id="domainButtons"></div>
          <div class="info-box" id="infoBox"></div>
        </div>
      </div>
    </div>

    <!-- Analytics Tab -->
    <div class="tab-content" id="tab-analytics">
      <div class="analytics-grid" id="statsGrid"></div>
      <div class="chart-container">
        <div class="chart-title">Topic Distribution</div>
        <canvas id="topicChart"></canvas>
      </div>
      <div class="degree-list" id="degreeList">
        <div class="chart-title">Page Connectivity</div>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar-group">
        <span class="mode-chip active" data-mode="semantic" onclick="switchGraphMode('semantic')">Semantic</span>
        <span class="mode-chip" data-mode="full" onclick="switchGraphMode('full')">Full</span>
      </div>
      <div class="toolbar-divider"></div>
      <div class="toolbar-group" id="filterChips"></div>
      <div class="toolbar-divider"></div>
      <div class="toolbar-group">
        <select class="domain-select" id="domainSelect" onchange="onDomainSelect(this.value); this.value='';">
          <option value="" disabled selected>Domain</option>
        </select>
        <span id="domainTags"></span>
      </div>
      <div class="toolbar-divider"></div>
      <input class="search-input" id="graphSearch" placeholder="Search nodes..." oninput="searchNodes(this.value)">
      <div class="toolbar-divider"></div>
      <div class="toolbar-group">
        <span class="mode-chip" id="clusterBtn" onclick="toggleClustering()">Cluster</span>
      </div>
      <div class="toolbar-divider"></div>
      <div class="toolbar-group">
        <span class="mode-chip active" data-dim="2d" onclick="switchDimension('2d')">2D</span>
        <span class="mode-chip" data-dim="3d" onclick="switchDimension('3d')">3D</span>
      </div>
    </div>

    <!-- Graph -->
    <div class="graph-container">
      <div id="mynetwork"></div>
      <button class="reset-highlight-btn" id="resetHighlightBtn" onclick="resetHighlight()">Reset View</button>
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <div style="color:#94a3b8;font-size:13px">Loading...</div>
      </div>
      <div class="legend" id="legend"></div>
      <div class="node-info-panel" id="nodeInfoPanel">
        <span class="close-panel" onclick="closeNodeInfo()">&times;</span>
        <div class="node-info-title" id="nodeInfoTitle"></div>
        <div id="nodeInfoContent"></div>
      </div>
      <button class="gear-btn" onclick="toggleSettings()" title="Settings">&#9881;</button>
      <div class="settings-panel" id="settingsPanel">
        <div class="settings-title">Graph Settings</div>
        <div class="setting-row">
          <span class="setting-label">Physics</span>
          <div class="setting-toggle on" id="physicsToggle" onclick="togglePhysics()"></div>
        </div>
        <div class="setting-row">
          <span class="setting-label">Gravity</span>
          <input type="range" class="setting-slider" id="gravitySlider" min="-10000" max="-500" value="-2000" oninput="updateGravity(this.value)">
        </div>
        <div class="setting-row">
          <span class="setting-label">Node Size</span>
          <input type="range" class="setting-slider" id="sizeSlider" min="8" max="40" value="18" oninput="updateNodeSize(this.value)">
        </div>
        <div class="setting-row">
          <span class="setting-label">Edge Labels</span>
          <div class="setting-toggle" id="edgeLabelToggle" onclick="toggleEdgeLabels()"></div>
        </div>
        <div class="setting-row">
          <span class="setting-label">Hub Dim</span>
          <div class="setting-toggle on" id="hubDimToggle" onclick="toggleHubDim()"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const NODE_COLORS = {
  Page: '#60a5fa', Content: '#34d399', Space: '#fb923c',
  Domain: '#a78bfa', Topics: '#fbbf24', Status: '#f87171'
};
const DOMAIN_COLOR_PALETTE = [
  '#60a5fa', '#34d399', '#a78bfa', '#fb923c',
  '#f87171', '#fbbf24', '#38bdf8', '#4ade80',
  '#e879f9', '#fb7185', '#22d3ee', '#a3e635',
];
const HUB_THRESHOLD = 0.8;
const DOMAIN_SPREAD_RADIUS = 700;

let domainColors = {};
let domainPositions = {};

function _buildDomainMappings(domains) {
  domainColors = {};
  domainPositions = {};
  domains.forEach((d, i) => {
    domainColors[d] = DOMAIN_COLOR_PALETTE[i % DOMAIN_COLOR_PALETTE.length];
    const angle = (2 * Math.PI * i) / domains.length - Math.PI / 2;
    domainPositions[d] = {
      x: Math.cos(angle) * DOMAIN_SPREAD_RADIUS,
      y: Math.sin(angle) * DOMAIN_SPREAD_RADIUS,
    };
  });
}

let network, visNodes, visEdges;
let allNodesData = [], allEdgesData = [];
let nodeMap = new Map();
let pageIdMap = new Map();
let edgeMap = new Map();
let edgesBySource = new Map();
let edgesByTarget = new Map();
let currentMode = 'summary';
let graphMode = 'semantic';
let activeFilters = new Set(Object.keys(NODE_COLORS).filter(k => k !== 'Space' && k !== 'Status'));
let activeDomains = new Set();
let availableDomains = [];
let expandedPages = new Set();
let showEdgeLabels = false;
let hubDimEnabled = true;
let baseNodeSize = 18;
let pageCount = 0;
let topicChart = null;

/* ── Tabs ── */
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (tab === 'query' && i === 0) || (tab === 'analytics' && i === 1));
  });
  document.getElementById('tab-query').classList.toggle('active', tab === 'query');
  document.getElementById('tab-analytics').classList.toggle('active', tab === 'analytics');
  if (tab === 'analytics') loadAnalytics();
}

/* ── Query Mode ── */
function setMode(mode) {
  currentMode = mode;
  document.getElementById('modeSummary').classList.toggle('active', mode === 'summary');
  document.getElementById('modeList').classList.toggle('active', mode === 'list');
}
function setQuestion(q) { document.getElementById('question').value = q; }

/* ── Graph Mode ── */
function switchGraphMode(mode) {
  graphMode = mode;
  document.querySelectorAll('.mode-chip').forEach(c =>
    c.classList.toggle('active', c.dataset.mode === mode));
  initGraph();
}

/* ── Init ── */
window.onload = async () => {
  buildFilterChips();
  buildLegend();
  await initGraph();
};

function buildFilterChips() {
  const container = document.getElementById('filterChips');
  container.innerHTML = '';
  const visibleTypes = ['Page', 'Domain', 'Topics'];
  if (graphMode === 'full') visibleTypes.push('Content');
  for (const label of visibleTypes) {
    const color = NODE_COLORS[label] || '#64748b';
    const chip = document.createElement('span');
    const isActive = activeFilters.has(label);
    chip.className = 'filter-chip ' + (isActive ? 'active' : 'inactive');
    chip.style.background = color;
    chip.style.color = '#0f172a';
    chip.textContent = label;
    chip.dataset.label = label;
    chip.onclick = () => toggleFilter(label, chip);
    container.appendChild(chip);
  }

  const sel = document.getElementById('domainSelect');
  sel.innerHTML = '<option value="" disabled selected>Domain</option>';
  availableDomains.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d;
    opt.textContent = d;
    sel.appendChild(opt);
  });
  renderDomainTags();
}

function buildLegend() {
  const legend = document.getElementById('legend');
  legend.innerHTML = '';
  for (const [domain, color] of Object.entries(domainColors)) {
    legend.innerHTML += `<div class="legend-item"><div class="legend-color" style="background:${color}"></div>${domain}</div>`;
  }
  legend.innerHTML += `<div class="legend-item"><div class="legend-color" style="background:${NODE_COLORS.Topics}"></div>Topics</div>`;
}

function toggleFilter(label, chip) {
  if (activeFilters.has(label)) {
    activeFilters.delete(label);
    chip.classList.replace('active', 'inactive');
  } else {
    activeFilters.add(label);
    chip.classList.replace('inactive', 'active');
  }
  applyFilters();
}

function onDomainSelect(domain) {
  if (!domain || activeDomains.has(domain)) return;
  activeDomains.add(domain);
  renderDomainTags();
  applyFilters(true);
}

function removeDomainTag(domain) {
  activeDomains.delete(domain);
  renderDomainTags();
  applyFilters(true);
}

function renderDomainTags() {
  const container = document.getElementById('domainTags');
  container.innerHTML = '';
  activeDomains.forEach(d => {
    const color = domainColors[d] || '#64748b';
    const tag = document.createElement('span');
    tag.className = 'domain-tag';
    tag.style.background = color;
    tag.innerHTML = `${d}<span class="domain-tag-x" onclick="removeDomainTag('${d}')">&times;</span>`;
    container.appendChild(tag);
  });
}

function applyFilters(autoFit) {
  if (!visNodes) return;
  const searchTerm = document.getElementById('graphSearch').value.toLowerCase();
  const domainFiltering = activeDomains.size > 0;

  const visiblePageIds = new Set();
  if (domainFiltering) {
    allNodesData.forEach(n => {
      if (n.label === 'Page' && activeDomains.has(n.domain)) {
        visiblePageIds.add(n.id);
      }
    });
  }

  const connectedNonPageIds = new Set();
  if (domainFiltering) {
    allEdgesData.forEach(e => {
      if (visiblePageIds.has(e.source)) connectedNonPageIds.add(e.target);
      if (visiblePageIds.has(e.target)) connectedNonPageIds.add(e.source);
    });
  }

  const visibleIds = [];
  const batchUpdates = [];
  visNodes.get().forEach(n => {
    const nodeData = nodeMap.get(n.id);
    if (!nodeData) return;
    const typeVisible = activeFilters.has(nodeData.label);
    const matchSearch = !searchTerm || (nodeData.title || '').toLowerCase().includes(searchTerm);

    let domainVisible = true;
    if (domainFiltering) {
      if (nodeData.label === 'Page') {
        domainVisible = visiblePageIds.has(nodeData.id);
      } else if (nodeData.label === 'Domain') {
        domainVisible = activeDomains.has(nodeData.title);
      } else {
        domainVisible = connectedNonPageIds.has(nodeData.id);
      }
    }

    const show = typeVisible && matchSearch && domainVisible;
    batchUpdates.push({ id: n.id, hidden: !show });
    if (show) visibleIds.push(n.id);
  });
  visNodes.update(batchUpdates);

  if (autoFit && network && visibleIds.length > 0) {
    network.fit({ nodes: visibleIds, animation: { duration: 600, easingFunction: 'easeInOutQuad' } });
  }
}

let _searchTimer = null;
function searchNodes(term) {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(() => applyFilters(), 200);
}

/* ── Graph Init ── */
async function initGraph() {
  try {
    const resp = await fetch(`/graph?mode=${graphMode}`);
    const data = await resp.json();
    allNodesData = data.nodes;
    allEdgesData = data.edges;
    pageCount = data.page_count || 0;
    availableDomains = data.domains || [];
    expandedPages.clear();

    nodeMap = new Map();
    pageIdMap = new Map();
    edgeMap = new Map();
    allNodesData.forEach(n => {
      nodeMap.set(n.id, n);
      if (n.properties?.page_id) pageIdMap.set(n.properties.page_id, n);
    });
    edgeMap = new Map();
    edgesBySource = new Map();
    edgesByTarget = new Map();
    allEdgesData.forEach(e => {
      edgeMap.set(e.id, e);
      if (!edgesBySource.has(e.source)) edgesBySource.set(e.source, []);
      edgesBySource.get(e.source).push(e);
      if (!edgesByTarget.has(e.target)) edgesByTarget.set(e.target, []);
      edgesByTarget.get(e.target).push(e);
    });

    _buildDomainMappings(availableDomains);
    buildFilterChips();
    buildLegend();
    renderGraph();
  } catch (err) {
    console.error('Graph init failed:', err);
  }
}

function _domainColor(node) {
  if (node.label === 'Page' && node.domain) {
    return domainColors[node.domain] || NODE_COLORS.Page;
  }
  return NODE_COLORS[node.label] || '#64748b';
}

function _initialPosition(node) {
  if (node.label === 'Page' && node.domain && domainPositions[node.domain]) {
    const base = domainPositions[node.domain];
    const jitter = () => (Math.random() - 0.5) * 300;
    return { x: base.x + jitter(), y: base.y + jitter() };
  }
  if (node.label === 'Domain' && domainPositions[node.title]) {
    return domainPositions[node.title];
  }
  return { x: (Math.random() - 0.5) * 200, y: (Math.random() - 0.5) * 200 };
}

function renderGraph() {
  const hubIds = detectHubs();

  const nodesArr = allNodesData.map(n => {
    const isHub = hubIds.has(n.id);
    const dimmed = hubDimEnabled && isHub;
    const color = _domainColor(n);
    const pos = _initialPosition(n);
    return {
      id: n.id,
      label: n.title.length > 22 ? n.title.substring(0, 22) + '...' : n.title,
      title: `${n.label}: ${n.title}${n.domain ? ' [' + n.domain + ']' : ''}`,
      x: pos.x, y: pos.y,
      color: {
        background: dimmed ? color + '30' : color,
        border: dimmed ? color + '40' : color,
        highlight: { background: color, border: '#fff' }
      },
      font: { size: dimmed ? 9 : 11, color: dimmed ? '#475569' : '#e2e8f0' },
      shape: n.label === 'Page' ? 'dot' : (n.label === 'Content' ? 'diamond' : 'dot'),
      size: dimmed ? 8 : (n.label === 'Page' ? baseNodeSize : baseNodeSize * 0.7),
      borderWidth: dimmed ? 1 : 2,
      hidden: !activeFilters.has(n.label),
    };
  });

  const edgesArr = allEdgesData.map(e => {
    const srcHub = hubIds.has(e.source);
    const tgtHub = hubIds.has(e.target);
    const dimmed = hubDimEnabled && (srcHub || tgtHub);
    return {
      id: e.id,
      from: e.source,
      to: e.target,
      label: showEdgeLabels ? e.relationship : '',
      arrows: 'to',
      color: { color: dimmed ? '#334155' : '#475569', highlight: '#ef4444' },
      width: dimmed ? 0.5 : 1.5,
      dashes: dimmed,
      font: { size: 8, color: '#64748b' },
      smooth: { type: 'continuous' },
    };
  });

  visNodes = new vis.DataSet(nodesArr);
  visEdges = new vis.DataSet(edgesArr);

  if (network) network.destroy();
  const container = document.getElementById('mynetwork');

  network = new vis.Network(
    container,
    { nodes: visNodes, edges: visEdges },
    {
      autoResize: true,
      physics: {
        enabled: true,
        barnesHut: {
          gravitationalConstant: parseInt(document.getElementById('gravitySlider').value),
          centralGravity: 0.05,
          springConstant: 0.02,
          springLength: 300,
          damping: 0.2,
          avoidOverlap: 0.8,
        },
        stabilization: { iterations: 100, updateInterval: 25, fit: true },
      },
      interaction: { hover: true, tooltipDelay: 100, zoomView: true },
      nodes: { borderWidth: 2, shadow: { enabled: true, size: 4, color: 'rgba(0,0,0,0.3)' } },
      edges: { shadow: false },
    }
  );

  network.on('click', p => {
    if (p.nodes.length > 0) showNodeInfo(p.nodes[0]);
    else closeNodeInfo();
  });
  network.on('doubleClick', p => {
    if (p.nodes.length > 0) {
      const nd = nodeMap.get(p.nodes[0]);
      if (nd && nd.label === 'Page') toggleExpandPage(nd);
    }
  });

  network.once('stabilizationIterationsDone', () => {
    network.fit({ animation: { duration: 400, easingFunction: 'easeInOutQuad' } });
    network.setOptions({ physics: false });
    document.getElementById('physicsToggle').classList.remove('on');
  });
}

/* ── Hub Detection ── */
function detectHubs() {
  const hubIds = new Set();
  if (pageCount <= 1) return hubIds;

  const degreeMap = {};
  allEdgesData.forEach(e => {
    degreeMap[e.source] = (degreeMap[e.source] || 0) + 1;
    degreeMap[e.target] = (degreeMap[e.target] || 0) + 1;
  });

  const threshold = pageCount * HUB_THRESHOLD;
  for (const nd of allNodesData) {
    if (nd.label === 'Page' || nd.label === 'Content' || nd.label === 'Domain') continue;
    const deg = degreeMap[nd.id] || 0;
    if (deg >= threshold) hubIds.add(nd.id);
  }
  return hubIds;
}

/* ── Expand / Collapse Page Chunks ── */
async function toggleExpandPage(nd) {
  const pid = nd.properties?.page_id;
  if (!pid) return;

  if (expandedPages.has(pid)) {
    const chunkIds = visNodes.get().filter(n => {
      const orig = nodeMap.get(n.id);
      return orig && orig.label === 'Content' && orig.properties?.page_id === pid;
    }).map(n => n.id);
    visNodes.remove(chunkIds);
    const edgeIds = visEdges.get().filter(e =>
      chunkIds.includes(e.from) || chunkIds.includes(e.to)
    ).map(e => e.id);
    visEdges.remove(edgeIds);
    chunkIds.forEach(id => nodeMap.delete(id));
    allNodesData = allNodesData.filter(n => !chunkIds.includes(n.id));
    allEdgesData = allEdgesData.filter(e => !edgeIds.includes(e.id));
    expandedPages.delete(pid);
    return;
  }

  try {
    const resp = await fetch(`/graph/expand/${pid}`);
    const data = await resp.json();
    if (!data.nodes.length) return;

    data.nodes.forEach(n => {
      allNodesData.push(n);
      nodeMap.set(n.id, n);
      if (n.properties?.page_id) pageIdMap.set(n.properties.page_id, n);
      visNodes.add({
        id: n.id,
        label: n.title.length > 22 ? n.title.substring(0, 22) + '...' : n.title,
        title: `Content: ${n.title}`,
        color: { background: NODE_COLORS.Content, border: NODE_COLORS.Content },
        font: { size: 10, color: '#e2e8f0' },
        shape: 'diamond',
        size: 12,
      });
    });
    data.edges.forEach(e => {
      allEdgesData.push(e);
      visEdges.add({
        id: e.id, from: e.source, to: e.target,
        label: showEdgeLabels ? e.relationship : '',
        arrows: 'to',
        color: { color: '#475569' }, width: 1,
        font: { size: 8, color: '#64748b' },
      });
    });
    expandedPages.add(pid);
    network.fit({ nodes: [nd.id, ...data.nodes.map(n => n.id)], animation: true });
  } catch (err) {
    console.error('Expand failed:', err);
  }
}

/* ── Node Info Panel ── */
function showNodeInfo(nodeId) {
  const nd = nodeMap.get(nodeId);
  if (!nd) return;

  const panel = document.getElementById('nodeInfoPanel');
  document.getElementById('nodeInfoTitle').textContent = `${nd.label}: ${nd.title}`;

  let html = '';

  const outEdges = edgesBySource.get(nodeId) || [];
  const inEdges = edgesByTarget.get(nodeId) || [];
  const totalDeg = outEdges.length + inEdges.length;
  html += `<div class="node-info-section">`;
  html += `<div class="node-info-section-title">Connections (${totalDeg})</div>`;

  const relGroups = {};
  [...outEdges, ...inEdges].forEach(e => {
    const r = e.relationship;
    relGroups[r] = (relGroups[r] || 0) + 1;
  });
  for (const [rel, cnt] of Object.entries(relGroups)) {
    html += `<div class="node-info-item"><span class="node-info-key">${rel}:</span><span class="node-info-value">${cnt}</span></div>`;
  }

  // Connected nodes (clickable)
  const connectedIds = new Set([
    ...outEdges.map(e => e.target),
    ...inEdges.map(e => e.source),
  ]);
  const connectedNodes = [];
  connectedIds.forEach(id => {
    const cn = nodeMap.get(id);
    if (cn && cn.label !== 'Content') connectedNodes.push(cn);
  });
  if (connectedNodes.length > 0) {
    html += `<div style="margin-top:6px">`;
    connectedNodes.slice(0, 10).forEach(cn => {
      html += `<div class="similar-item" onclick="focusNode('${cn.id}')">${cn.label}: ${cn.title}</div>`;
    });
    if (connectedNodes.length > 10) html += `<div style="font-size:10px;color:#475569">...+${connectedNodes.length - 10} more</div>`;
    html += `</div>`;
  }
  html += `</div>`;

  // Properties
  if (nd.properties && Object.keys(nd.properties).length > 0) {
    html += `<div class="node-info-section"><div class="node-info-section-title">Properties</div>`;
    for (const [k, v] of Object.entries(nd.properties)) {
      if (!v || v === '' || k === 'embedding') continue;
      let dv = v;
      if ((k === 'source_url' || k === 'url') && typeof v === 'string' && v.startsWith('http'))
        dv = `<a href="${v}" target="_blank">${v}</a>`;
      else if (typeof v === 'string' && v.length > 120)
        dv = v.substring(0, 120) + '...';
      html += `<div class="node-info-item"><span class="node-info-key">${k}:</span><span class="node-info-value">${dv}</span></div>`;
    }
    html += `</div>`;
  }

  // Page-specific: expand button + similar
  if (nd.label === 'Page' && nd.properties?.page_id) {
    const pid = nd.properties.page_id;
    const isExpanded = expandedPages.has(pid);
    html += `<button class="expand-btn" onclick="toggleExpandPage(nodeMap.get('${nodeId}'))">${isExpanded ? 'Collapse Chunks' : 'Show Chunks'}</button>`;
    html += `<div class="node-info-section" style="margin-top:8px"><div class="node-info-section-title">Similar Pages</div><div id="similarList">Loading...</div></div>`;
    loadSimilar(pid);
  }

  document.getElementById('nodeInfoContent').innerHTML = html;
  panel.classList.add('active');
}

async function loadSimilar(pageId) {
  try {
    const resp = await fetch(`/similar/${pageId}?top_k=5`);
    const data = await resp.json();
    const container = document.getElementById('similarList');
    if (!container) return;
    if (!data.similar || data.similar.length === 0) {
      container.innerHTML = '<div style="color:#475569;font-size:11px">No similar pages found</div>';
      return;
    }
    container.innerHTML = data.similar.map(s => {
      const matchNode = pageIdMap.get(s.page_id);
      const onclick = matchNode ? `onclick="focusNode('${matchNode.id}')"` : '';
      return `<div class="similar-item" ${onclick}>${s.title} <span style="color:#475569">(${(s.score * 100).toFixed(0)}%)</span></div>`;
    }).join('');
  } catch {
    const container = document.getElementById('similarList');
    if (container) container.innerHTML = '<div style="color:#475569;font-size:11px">Embeddings not available</div>';
  }
}

function focusNode(nodeId) {

}

/* ── Query (3-step drill-down) ── */
let lastQuestion = '';
let lastDomain = '';

async function askQuestion(opts) {
  let question, domain = null, pageTitle = null;

  if (typeof opts === 'object' && opts !== null) {
    question = lastQuestion;
    domain = opts.domain || null;
    pageTitle = opts.page_title || null;
    if (domain) lastDomain = domain;
  } else if (typeof opts === 'string') {
    question = lastQuestion;
    domain = opts;
    lastDomain = domain;
  } else {
    question = document.getElementById('question').value.trim();
    lastDomain = '';
  }
  if (!question) return;
  lastQuestion = question;

  document.getElementById('exampleQueries').classList.add('hidden');
  document.getElementById('askButton').disabled = true;
  document.getElementById('loading').classList.add('active');
  document.getElementById('answerBox').style.display = 'none';
  document.getElementById('answer').innerHTML = '';
  document.getElementById('domainButtons').innerHTML = '';
  document.getElementById('infoBox').innerHTML = '';
  resetHighlight();

  const topK = parseInt(document.getElementById('topK').value);

  try {
    await askQuestionStream(question, topK, domain, pageTitle);
  } catch (err) {
    alert('Search failed: ' + err.message);
  } finally {
    document.getElementById('askButton').disabled = false;
    document.getElementById('loading').classList.remove('active');
  }
}

async function askQuestionStream(question, topK, domain, pageTitle) {
  document.getElementById('answerBox').style.display = 'block';
  const answerEl = document.getElementById('answer');
  answerEl.innerHTML = '';
  answerEl.classList.add('streaming-cursor');
  document.getElementById('loading').classList.remove('active');

  let fullText = '';
  const body = { question, top_k: topK };
  if (domain) body.domain = domain;
  if (pageTitle) body.page_title = pageTitle;
  console.log('[Stream] requesting:', JSON.stringify(body));

  const resp = await fetch('/query/stream', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';

  function linkifyRawUrls(html) {
    return html.replace(
      /(?<!href=["'])(?<!["'>])(https?:\/\/[^\s<"')\]]+)/g,
      '<a href="$1" target="_blank" rel="noopener">$1</a>'
    );
  }

  function renderMarkdown(text) {
    return linkifyRawUrls(marked.parse(text));
  }

  function processSSELine(line) {
    if (!line.startsWith('data: ')) return;
    const jsonStr = line.slice(6).trim();
    if (!jsonStr) return;

    try {
      const evt = JSON.parse(jsonStr);
      if (evt.type === 'token') {
        fullText += evt.content;
        answerEl.innerHTML = renderMarkdown(fullText);
      } else if (evt.type === 'done') {
        answerEl.classList.remove('streaming-cursor');

        const container = document.getElementById('domainButtons');
        container.innerHTML = '';
        const step = evt.step || 'detail';

        if (step === 'overview') {
          let buttons = [];
          if (evt.domains && evt.domains.length >= 2) {
            buttons = evt.domains.map(d => ({ label: d, filter: { domain: d } }));
          }
          if (buttons.length === 0 && fullText) {
            const sectionKeywords = /^(요약|주제|단계|핵심|참고|주요|안내|답변|문서 제목|포인트)/;
            const boldRe = /\*\*([^*]+)\*\*/g;
            let bm;
            while ((bm = boldRe.exec(fullText)) !== null) {
              const title = bm[1].trim();
              if (title.length > 1 && title.length < 60 && !sectionKeywords.test(title)) {
                buttons.push({ label: title, filter: { domain: title } });
              }
            }
          }
          buttons.forEach(({ label, filter }) => {
            const btn = document.createElement('button');
            btn.className = 'domain-btn';
            btn.textContent = label;
            btn.onclick = () => askQuestion(filter);
            container.appendChild(btn);
          });

        } else if (step === 'list') {
          let buttons = [];
          if (evt.page_entries && evt.page_entries.length >= 2) {
            const activeDomain = domain || lastDomain || '';
            buttons = evt.page_entries.map(e => ({
              label: e.domain ? `[${e.domain}] ${e.title}` : e.title,
              filter: { domain: e.domain || activeDomain, page_title: e.title }
            }));
          }
          buttons.forEach(({ label, filter }) => {
            const btn = document.createElement('button');
            btn.className = 'domain-btn';
            btn.textContent = label;
            btn.onclick = () => askQuestion(filter);
            container.appendChild(btn);
          });
        }

        const stepLabels = { overview: 'Overview', list: 'Documents', detail: 'Detail' };
        let infoHtml = `Step: <b>${stepLabels[step] || step}</b>`;
        if (pageTitle) infoHtml += ` | 문서: <b>${pageTitle}</b>`;
        else if (domain) infoHtml += ` | 도메인: <b>${domain}</b>`;
        infoHtml += ` | k: <b>${topK}</b>`;
        infoHtml += ` | <span style="color:#94a3b8">검색: <b>${(evt.retrieval_sec||0).toFixed(1)}s</b></span>`;
        infoHtml += ` | <span style="color:#94a3b8">첫 토큰: <b>${(evt.first_token_sec||0).toFixed(1)}s</b></span>`;
        infoHtml += ` | Total: <b>${(evt.elapsed_sec||0).toFixed(1)}s</b>`;
        document.getElementById('infoBox').innerHTML = infoHtml;

        console.log('[Stream] done:', { step, domains: evt.domains, page_entries: evt.page_entries, nodes: evt.used_nodes });
        highlightResults(evt.used_nodes || [], evt.used_edges || []);
      } else if (evt.type === 'error') {
        answerEl.classList.remove('streaming-cursor');
        answerEl.innerHTML = `<span style="color:#f87171">Error: ${evt.message}</span>`;
      }
    } catch (e) {
      console.warn('SSE parse error:', e, line);
    }
  }

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop();
    for (const line of lines) processSSELine(line);
  }
  if (buffer.trim()) processSSELine(buffer);
  answerEl.classList.remove('streaming-cursor');
}

function highlightResults(nodeIds, edgeIds) {
  if (!visNodes || !visEdges) { console.warn('[Highlight] visNodes/visEdges not ready'); return; }
  console.log('[Highlight] nodeIds:', nodeIds, 'total graph nodes:', allNodesData.length);

  const matched = [];
  nodeIds.forEach(sid => {
    const parts = sid.split('_');
    const label = parts[0];
    const val = parts.slice(1).join('_');
    allNodesData.forEach(nd => {
      if (nd.label !== label) return;
      const p = nd.properties || {};
      if (
        (label === 'Page' && (p.page_id === val || p.title === val)) ||
        (label === 'Content' && p.content_id === val) ||
        (['Space', 'Domain', 'Topics', 'Status'].includes(label) && p.name === val)
      ) matched.push(nd.id);
    });
  });
  const matchedSet = new Set(matched);
  console.log('[Highlight] matched node ids:', matched);
  if (matchedSet.size === 0) { console.warn('[Highlight] no nodes matched'); return; }

  const connectedToMatched = new Set();
  allEdgesData.forEach(e => {
    if (matchedSet.has(e.source)) connectedToMatched.add(e.target);
    if (matchedSet.has(e.target)) connectedToMatched.add(e.source);
  });

  const nodeBatch = [];
  visNodes.get().forEach(n => {
    if (matchedSet.has(n.id)) {
      const nd = nodeMap.get(n.id);
      const color = _domainColor(nd || {});
      nodeBatch.push({
        id: n.id,
        color: { background: color, border: '#fff' },
        borderWidth: 4,
        size: baseNodeSize * 1.8,
        font: { size: 14, color: '#f8fafc', strokeWidth: 3, strokeColor: '#000' },
        shadow: { enabled: true, size: 20, color: color + '80' },
      });
    } else if (connectedToMatched.has(n.id)) {
      const nd = nodeMap.get(n.id);
      const color = _domainColor(nd || {});
      nodeBatch.push({
        id: n.id,
        color: { background: color + '60', border: color + '80' },
        font: { size: 9, color: '#94a3b8' },
        size: baseNodeSize * 0.7,
      });
    } else {
      nodeBatch.push({
        id: n.id,
        color: { background: '#1e293b20', border: '#33415540' },
        font: { size: 0, color: 'transparent' },
        size: baseNodeSize * 0.3,
      });
    }
  });
  visNodes.update(nodeBatch);

  const edgeBatch = [];
  visEdges.get().forEach(e => {
    const ed = edgeMap.get(e.id);
    if (ed && (matchedSet.has(ed.source) || matchedSet.has(ed.target)) &&
        (matchedSet.has(ed.source) || connectedToMatched.has(ed.source)) &&
        (matchedSet.has(ed.target) || connectedToMatched.has(ed.target))) {
      const isDirectMatch = matchedSet.has(ed.source) && matchedSet.has(ed.target);
      edgeBatch.push({
        id: e.id,
        color: { color: isDirectMatch ? '#ef4444' : '#475569' },
        width: isDirectMatch ? 3 : 1.5,
        label: showEdgeLabels ? ed.relationship : '',
      });
    } else {
      edgeBatch.push({ id: e.id, color: { color: '#1e293b20' }, width: 0.3, label: '' });
    }
  });
  visEdges.update(edgeBatch);

  document.getElementById('resetHighlightBtn').classList.add('visible');

  if (matched.length > 0) {
    network.fit({ nodes: matched, animation: { duration: 800, easingFunction: 'easeInOutQuad' } });
  }
}

function resetHighlight() {
  document.getElementById('resetHighlightBtn').classList.remove('visible');
  renderGraph();
}

/* ── 2D/3D Toggle ── */
let currentDim = '2d';
let graph3d = null;

function switchDimension(dim) {
  currentDim = dim;
  document.querySelectorAll('[data-dim]').forEach(c =>
    c.classList.toggle('active', c.dataset.dim === dim));

  const container = document.getElementById('mynetwork');

  if (dim === '3d') {
    if (network) { network.destroy(); network = null; }
    container.innerHTML = '';
    render3D(container);
  } else {
    if (graph3d) { graph3d._destructor && graph3d._destructor(); graph3d = null; }
    container.innerHTML = '';
    renderGraph();
  }
}

function render3D(container) {
  const hubIds = detectHubs();

  const domainFiltering = activeDomains.size > 0;
  const nodes3d = allNodesData.filter(n => {
    if (!activeFilters.has(n.label)) return false;
    if (domainFiltering && n.label === 'Page' && !activeDomains.has(n.domain)) return false;
    return true;
  }).map(n => {
    const isHub = hubIds.has(n.id);
    const dimmed = hubDimEnabled && isHub;
    const color = _domainColor(n);
    const pos = _initialPosition(n);
    return {
      id: n.id,
      name: n.title,
      group: n.domain || n.label,
      val: dimmed ? 1 : (n.label === 'Page' ? 4 : 2),
      color: dimmed ? color + '40' : color,
      fx: n.label === 'Domain' ? pos.x : undefined,
      fy: n.label === 'Domain' ? pos.y : undefined,
      x: pos.x, y: pos.y, z: (Math.random() - 0.5) * 200,
      _data: n,
    };
  });

  const nodeIdSet = new Set(nodes3d.map(n => n.id));
  const links3d = allEdgesData
    .filter(e => nodeIdSet.has(e.source) && nodeIdSet.has(e.target))
    .map(e => {
      const srcNode = nodeMap.get(e.source);
      return {
        source: e.source,
        target: e.target,
        name: e.relationship,
        color: _domainColor(srcNode || {}),
      };
    });

  graph3d = ForceGraph3D()(container)
    .graphData({ nodes: nodes3d, links: links3d })
    .nodeLabel(n => `${n.group}: ${n.name}`)
    .nodeColor(n => n.color)
    .nodeVal(n => n.val)
    .nodeOpacity(0.9)
    .linkColor(l => l.color + 'CC')
    .linkWidth(1.5)
    .linkOpacity(0.4)
    .linkDirectionalArrowLength(4)
    .linkDirectionalArrowRelPos(1)
    .linkDirectionalParticles(1)
    .linkDirectionalParticleWidth(1.5)
    .linkDirectionalParticleSpeed(0.003)
    .linkDirectionalParticleColor(l => l.color)
    .backgroundColor('#0f172a')
    .width(container.clientWidth)
    .height(container.clientHeight)
    .onNodeClick(node => {
      if (node._data) showNodeInfo(node.id);
    });

  window.addEventListener('resize', () => {
    if (graph3d && currentDim === '3d') {
      graph3d.width(container.clientWidth).height(container.clientHeight);
    }
  });
}

/* ── Clustering ── */
let clustered = false;

function toggleClustering() {
  const btn = document.getElementById('clusterBtn');
  if (clustered) {
    network.setData({ nodes: visNodes, edges: visEdges });
    clustered = false;
    btn.classList.remove('active');
    return;
  }

  const topicNodes = allNodesData.filter(n => n.label === 'Topics');
  topicNodes.forEach(tn => {
    const connPageIds = allEdgesData
      .filter(e => e.target === tn.id && e.relationship === 'HAS_TOPICS')
      .map(e => e.source);
    if (connPageIds.length < 2) return;

    const clusterNodes = [tn.id, ...connPageIds];
    network.cluster({
      joinCondition: (nodeOptions) => clusterNodes.includes(nodeOptions.id),
      clusterNodeProperties: {
        id: 'cluster_topic_' + tn.id,
        label: tn.title + ` (${connPageIds.length})`,
        shape: 'dot',
        size: 28,
        color: { background: NODE_COLORS.Topics, border: '#f59e0b' },
        font: { size: 13, color: '#f8fafc', bold: true },
        borderWidth: 3,
      },
    });
  });

  clustered = true;
  btn.classList.add('active');
}

/* ── Analytics ── */
async function loadAnalytics() {
  try {
    const resp = await fetch('/analytics');
    const data = await resp.json();

    const grid = document.getElementById('statsGrid');
    const nc = data.node_counts || {};
    const rc = data.relationship_counts || {};
    const totalNodes = Object.values(nc).reduce((a, b) => a + b, 0);
    const totalRels = Object.values(rc).reduce((a, b) => a + b, 0);
    grid.innerHTML = `
      <div class="stat-card"><div class="stat-value">${nc.Page || 0}</div><div class="stat-label">Pages</div></div>
      <div class="stat-card"><div class="stat-value">${nc.Content || 0}</div><div class="stat-label">Chunks</div></div>
      <div class="stat-card"><div class="stat-value">${totalNodes}</div><div class="stat-label">Total Nodes</div></div>
      <div class="stat-card"><div class="stat-value">${totalRels}</div><div class="stat-label">Total Relations</div></div>
    `;

    // Topic chart
    const topics = data.topic_distribution || [];
    if (topics.length > 0) {
      const ctx = document.getElementById('topicChart').getContext('2d');
      if (topicChart) topicChart.destroy();
      topicChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: topics.map(t => t.name),
          datasets: [{
            data: topics.map(t => t.count),
            backgroundColor: ['#60a5fa','#34d399','#fbbf24','#a78bfa','#fb923c','#f87171','#38bdf8','#4ade80','#facc15','#c084fc'],
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: 'right', labels: { color: '#94a3b8', font: { size: 10 } } },
          }
        }
      });
    }

    // Degree list
    const degrees = data.page_degrees || [];
    const maxDeg = Math.max(...degrees.map(d => d.degree), 1);
    const degList = document.getElementById('degreeList');
    degList.innerHTML = '<div class="chart-title">Page Connectivity</div>';
    degrees.forEach(d => {
      const pct = (d.degree / maxDeg * 100).toFixed(0);
      degList.innerHTML += `
        <div class="degree-item">
          <span>${d.title}</span><span>${d.degree}</span>
        </div>
        <div class="degree-bar" style="width:${pct}%"></div>
      `;
    });
  } catch (err) {
    console.error('Analytics failed:', err);
  }
}
